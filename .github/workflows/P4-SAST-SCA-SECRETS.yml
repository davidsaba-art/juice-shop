# ── P4-SAST-SCA-SECRETS ───────────────────────────────────────────────────
# Maturity level 4: adds secret detection across the full git history.
# Gates remain advisory.
name: P4-SAST-SCA-SECRETS

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

env:
  # See P3 for why Grype replaced the Trivy action here.
  GRYPE_IMAGE: anchore/grype:v0.104.4

jobs:
  build-and-scan:
    name: Build, SAST, SCA and secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # gitleaks needs full history

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build --if-present
        continue-on-error: true

      - name: Prepare reports directory
        run: mkdir -p reports

      # --- SAST ------------------------------------------------------------
      - name: Semgrep (SAST)
        run: |
          python3 -m pip install --quiet semgrep
          semgrep scan \
            --config=p/owasp-top-ten \
            --config=p/javascript \
            --config=p/typescript \
            --sarif --output reports/semgrep.sarif \
            --metrics=off || true

      # --- SCA -------------------------------------------------------------
      - name: npm audit (SCA)
        run: npm audit --json > reports/npm-audit.json || true

      - name: Grype filesystem scan (SCA)
        run: |
          docker run --rm -v "$PWD:/src:ro" "$GRYPE_IMAGE" \
            dir:/src -o json > reports/grype-fs.json 2>/dev/null || \
            echo '{"matches":[]}' > reports/grype-fs.json

      # --- Secrets ---------------------------------------------------------
      - name: Gitleaks (secret detection)
        run: |
          curl -sSL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect \
            --source . \
            --report-format sarif \
            --report-path reports/gitleaks.sarif \
            --exit-code 0 \
            --redact

      - name: Finding counts
        run: |
          echo "Semgrep:   $(jq '[.runs[].results[]] | length' reports/semgrep.sarif)"
          echo "npm audit: $(jq '.vulnerabilities // {} | length' reports/npm-audit.json)"
          echo "Grype fs:  $(jq '.matches | length' reports/grype-fs.json)"
          echo "Gitleaks:  $(jq '[.runs[].results[]] | length' reports/gitleaks.sarif)"

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: P4-SAST-SCA-SECRETS-reports
          path: reports/
          retention-days: 30
