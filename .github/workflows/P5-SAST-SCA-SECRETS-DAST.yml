# ── P5-SAST-SCA-SECRETS-DAST ──────────────────────────────────────────────
# Maturity level 5: adds dynamic testing against a running instance.
# The app is built, started in the runner, and probed with ZAP baseline.
# Gates remain advisory.
name: P5-SAST-SCA-SECRETS-DAST

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

env:
  # See P3 for why Grype replaced the Trivy action here.
  GRYPE_IMAGE: anchore/grype:v0.104.4

jobs:
  static-scans:
    name: SAST, SCA and secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Semgrep (SAST)
        run: |
          python3 -m pip install --quiet semgrep
          semgrep scan \
            --config=p/owasp-top-ten \
            --config=p/javascript \
            --config=p/typescript \
            --sarif --output reports/semgrep.sarif \
            --metrics=off || true

      - name: npm audit (SCA)
        run: npm audit --json > reports/npm-audit.json || true

      - name: Grype filesystem scan (SCA)
        run: |
          docker run --rm -v "$PWD:/src:ro" "$GRYPE_IMAGE" \
            dir:/src -o json > reports/grype-fs.json 2>/dev/null || \
            echo '{"matches":[]}' > reports/grype-fs.json

      - name: Gitleaks (secret detection)
        run: |
          curl -sSL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect --source . \
            --report-format sarif --report-path reports/gitleaks.sarif \
            --exit-code 0 --redact

      - name: Upload static reports
        uses: actions/upload-artifact@v4
        with:
          name: P5-static-tmp
          path: reports/
          retention-days: 1

  dast:
    name: DAST against running instance
    runs-on: ubuntu-latest
    needs: static-scans
    steps:
      - uses: actions/checkout@v4

      - name: Prepare reports directory
        run: mkdir -p reports zap-wrk && chmod 777 zap-wrk

      - name: Build and start the application
        run: |
          docker build -t juice-shop-under-test:ci .
          docker run -d --name app -p 3000:3000 juice-shop-under-test:ci
          echo "Waiting for the app to answer on :3000 ..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "up after ${i}s"; break
            fi
            sleep 1
          done
          curl -sf http://localhost:3000 > /dev/null || {
            echo "App failed to start"; docker logs app; exit 1; }

      - name: ZAP baseline scan (DAST)
        run: |
          docker run --rm --network host \
            -v "$(pwd)/zap-wrk:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t http://localhost:3000 \
              -J zap-baseline.json \
              -m 5 \
              -I || true
          cp zap-wrk/zap-baseline.json reports/ 2>/dev/null || \
            echo '{"site":[]}' > reports/zap-baseline.json

      - name: Stop the application
        if: always()
        run: docker rm -f app || true

      - name: Download static reports
        uses: actions/download-artifact@v4
        with:
          name: P5-static-tmp
          path: reports/

      - name: Upload combined reports
        uses: actions/upload-artifact@v4
        with:
          name: P5-SAST-SCA-SECRETS-DAST-reports
          path: reports/
          retention-days: 30
