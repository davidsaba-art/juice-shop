# ── P2-SAST ───────────────────────────────────────────────────────────────
# Maturity level 2: static application security testing added.
# Gate is advisory only -- findings are recorded but do not fail the build.
name: P2-SAST

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-scan:
    name: Build, test and SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build --if-present
        continue-on-error: true

      - name: Prepare reports directory
        run: mkdir -p reports

      # --- SAST ------------------------------------------------------------
      - name: Semgrep (SAST)
        run: |
          python3 -m pip install --quiet semgrep
          semgrep scan \
            --config=p/owasp-top-ten \
            --config=p/javascript \
            --config=p/typescript \
            --sarif --output reports/semgrep.sarif \
            --metrics=off || true

      - name: Finding count
        run: |
          echo "Semgrep findings: $(jq '[.runs[].results[]] | length' reports/semgrep.sarif)"

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: P2-SAST-reports
          path: reports/
          retention-days: 30
