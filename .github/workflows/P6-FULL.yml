# ── P6-FULL ───────────────────────────────────────────────────────────────
# Maturity level 6: the full stack, with container image scanning added and
# -- the key difference from P5 -- ENFORCED gates. Critical and high findings
# fail the build, which is what makes P6 a genuinely different maturity level
# rather than just one more tool.
name: P6-FULL

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: read

env:
  # Set to 'false' to observe what P6 would have blocked without blocking it.
  ENFORCE_GATES: 'true'
  # See P3 for why Grype replaced the Trivy action here.
  GRYPE_IMAGE: anchore/grype:v0.104.4

jobs:
  static-scans:
    name: SAST, SCA, secrets and container scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Semgrep (SAST)
        run: |
          python3 -m pip install --quiet semgrep
          semgrep scan \
            --config=p/owasp-top-ten \
            --config=p/javascript \
            --config=p/typescript \
            --sarif --output reports/semgrep.sarif \
            --metrics=off || true

      - name: npm audit (SCA)
        run: npm audit --json > reports/npm-audit.json || true

      - name: Grype filesystem scan (SCA)
        run: |
          docker run --rm -v "$PWD:/src:ro" "$GRYPE_IMAGE" \
            dir:/src -o json > reports/grype-fs.json 2>/dev/null || \
            echo '{"matches":[]}' > reports/grype-fs.json

      - name: Gitleaks (secret detection)
        run: |
          curl -sSL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks detect --source . \
            --report-format sarif --report-path reports/gitleaks.sarif \
            --exit-code 0 --redact

      # --- Container image scanning (new at this level) ---------------------
      - name: Build image
        run: docker build -t juice-shop-under-test:ci .

      - name: Grype image scan
        run: |
          docker save juice-shop-under-test:ci -o image.tar
          docker run --rm -v "$PWD:/w:ro" "$GRYPE_IMAGE" \
            docker-archive:/w/image.tar -o json > reports/grype-image.json 2>/dev/null || \
            echo '{"matches":[]}' > reports/grype-image.json
          rm -f image.tar

      # --- Enforced gate ----------------------------------------------------
      # Reports are uploaded BEFORE the gate runs, so a blocked build still
      # produces the artifacts the study needs.
      - name: Upload static reports
        uses: actions/upload-artifact@v4
        with:
          name: P6-static-tmp
          path: reports/
          retention-days: 1

      - name: Security gate (critical/high fails the build)
        run: |
          SEM=$(jq '[.runs[].results[]
                     | select((.properties["security-severity"] // "0" | tonumber) >= 7.0)]
                    | length' reports/semgrep.sarif)
          GFS=$(jq '[.matches[]
                     | select(.vulnerability.severity=="Critical" or .vulnerability.severity=="High")]
                    | length' reports/grype-fs.json)
          GIM=$(jq '[.matches[]
                     | select(.vulnerability.severity=="Critical" or .vulnerability.severity=="High")]
                    | length' reports/grype-image.json)
          SEC=$(jq '[.runs[].results[]] | length' reports/gitleaks.sarif)
          TOTAL=$((SEM + GFS + GIM + SEC))

          echo "::notice::Gate tally -- SAST:$SEM  SCA-fs:$GFS  image:$GIM  secrets:$SEC"
          echo "Blocking findings: $TOTAL"

          if [ "$TOTAL" -gt 0 ] && [ "${ENFORCE_GATES}" = "true" ]; then
            echo "::error::Security gate failed with $TOTAL critical/high findings."
            exit 1
          fi
          echo "Gate passed."

  dast:
    name: DAST against running instance
    runs-on: ubuntu-latest
    needs: static-scans
    # Run the dynamic scan even when the gate blocked the build -- the study
    # needs P6's complete pre-deployment detection set either way.
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Prepare directories
        run: mkdir -p reports zap-wrk && chmod 777 zap-wrk

      - name: Build and start the application
        run: |
          docker build -t juice-shop-under-test:ci .
          docker run -d --name app -p 3000:3000 juice-shop-under-test:ci
          for i in $(seq 1 60); do
            curl -sf http://localhost:3000 > /dev/null && { echo "up after ${i}s"; break; }
            sleep 1
          done
          curl -sf http://localhost:3000 > /dev/null || {
            echo "App failed to start"; docker logs app; exit 1; }

      - name: ZAP full scan (DAST)
        run: |
          docker run --rm --network host \
            -v "$(pwd)/zap-wrk:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py \
              -t http://localhost:3000 \
              -J zap-full.json \
              -m 10 \
              -I || true
          cp zap-wrk/zap-full.json reports/ 2>/dev/null || \
            echo '{"site":[]}' > reports/zap-full.json

      - name: Stop the application
        if: always()
        run: docker rm -f app || true

      - name: Download static reports
        uses: actions/download-artifact@v4
        with:
          name: P6-static-tmp
          path: reports/

      - name: Upload combined reports
        uses: actions/upload-artifact@v4
        with:
          name: P6-FULL-reports
          path: reports/
          retention-days: 30
